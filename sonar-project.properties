# ============================================================
# SonarQube Project Configuration
# ============================================================

sonar.projectKey=gymflow-erp
sonar.projectName=GymFlow ERP & Analytics Suite
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# Analyze both Java and Python codebases
sonar.modules=backend,ml-service

# ------------------------------------------------------------
# Module 1: Java Backend
# ------------------------------------------------------------
backend.sonar.projectName=GymFlow ERP - Java Backend
backend.sonar.sources=src/main/java
backend.sonar.tests=src/test/java
backend.sonar.java.binaries=target/classes
backend.sonar.java.test.binaries=target/test-classes
backend.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
backend.sonar.exclusions=**/model/**, **/config/**, **/security/**, **/GymFlowErpApplication.java, **/DataSeeder.java

# ------------------------------------------------------------
# Module 2: Python ML Service
# ------------------------------------------------------------
ml-service.sonar.projectName=GymFlow ERP - Python ML Service
ml-service.sonar.sources=.
ml-service.sonar.tests=tests
ml-service.sonar.language=py
ml-service.sonar.python.version=3.11
ml-service.sonar.python.coverage.reportPaths=coverage.xml
ml-service.sonar.exclusions=tests/**, __pycache__/**, *.ini, requirements.txt
