[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-config=.coveragerc

[coverage:run]
omit =
    tests/*
    __pycache__/*
    */migrations/*

[coverage:report]
fail_under = 80
show_missing = true
