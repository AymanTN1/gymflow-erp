services:
  db:
    image: postgres:15-alpine
    container_name: gymflow-db
    environment:
      POSTGRES_DB: gymflow_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: gymflow-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: gymflow_erp
      DB_USER: postgres
      DB_PASS: postgres
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_VOTRE_CLE_SECRETE_ICI}
    ports:
      - "8080:8080"
    depends_on:
      - db
      - mailhog
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: gymflow-frontend
    ports:
      - "5173:5173"
      - "80:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  mailhog:
    image: axllent/mailpit:latest
    container_name: gymflow-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  ml-service:
    image: gymflow-erp-ml-service
    container_name: gymflow-ml
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./ml-service:/app
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: gymflow_erp
      DB_USER: postgres
      DB_PASS: postgres
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
