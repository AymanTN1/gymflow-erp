services:
  db:
    image: postgres:15-alpine
    container_name: gymflow-db
    environment:
      POSTGRES_DB: gymflow_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: gymflow-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: gymflow_erp
      DB_USER: postgres
      DB_PASS: postgres
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: gymflow-frontend
    ports:
      - "5173:5173"
      - "80:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
